CONFIG_TARGET_ipq60xx=y
CONFIG_TARGET_ipq60xx_generic=y
CONFIG_TARGET_ipq60xx_generic_DEVICE_zinneng_zn-m2=y
CONFIG_HAS_SUBTARGETS=y
CONFIG_TARGET_BOARD="ipq60xx"
CONFIG_TARGET_SUBTARGET="generic"
CONFIG_TARGET_PROFILE="DEVICE_zinneng_zn-m2"
CONFIG_TARGET_ARCH_PACKAGES="armcortex-a53"

# 内核稳定版（NSS 不炸）
CONFIG_LINUX_5_10=y
# CONFIG_LINUX_5_4 is not set

# --------------------------
# 1. 关闭 WiFi、USB、存储（你要求精简）
# --------------------------
CONFIG_WPA_SUPPLICANT_DBUS_old is not set
CONFIG_PACKAGE_kmod-ath is not set
CONFIG_PACKAGE_kmod-ath9k is not set
CONFIG_PACKAGE_kmod-ath10k is not set
CONFIG_PACKAGE_kmod-ath11k is not set
CONFIG_PACKAGE_kmod-mac80211 is not set
CONFIG_PACKAGE_kmod-cfg80211 is not set
CONFIG_PACKAGE_wpad-basic is not set
CONFIG_PACKAGE_wpad is not set
CONFIG_PACKAGE_hostapd is not set
CONFIG_PACKAGE_iw is not set

CONFIG_PACKAGE_kmod-usb-core is not set
CONFIG_PACKAGE_kmod-usb-ohci is not set
CONFIG_PACKAGE_kmod-usb-uhci is not set
CONFIG_PACKAGE_kmod-usb2 is not set
CONFIG_PACKAGE_kmod-usb3 is not set
CONFIG_PACKAGE_kmod-usb-ledtrig-usbport is not set
CONFIG_PACKAGE_kmod-usb-storage is not set
CONFIG_PACKAGE_kmod-usb-storage-uas is not set
CONFIG_PACKAGE_kmod-usb-net is not set
CONFIG_PACKAGE_kmod-usb-net-rtl8152 is not set
CONFIG_PACKAGE_usb-modeswitch is not set

CONFIG_PACKAGE_kmod-fs-ext4 is not set
CONFIG_PACKAGE_kmod-fs-vfat is not set
CONFIG_PACKAGE_kmod-nls-cp437 is not set
CONFIG_PACKAGE_kmod-nls-iso8859-1 is not set
CONFIG_PACKAGE_kmod-fs-squashfs is not set
CONFIG_PACKAGE_blockd is not set
CONFIG_PACKAGE_fdisk is not set
CONFIG_PACKAGE_cfdisk is not set
CONFIG_PACKAGE_e2fsprogs is not set

# --------------------------
# 2. NSS 核心（仅开基础加速，关闭炸编译的模块）
# --------------------------
CONFIG_NSS_DRV=y
CONFIG_NSS_ECM=y
CONFIG_NSS_FWD=y

# 关键：关闭 PVxLAN 解决 nss_pvxlan_log.c 报错
CONFIG_NSS_PVXLAN is not set
CONFIG_NSS_PVXLAN_DEBUG is not set

CONFIG_NSS_BRIDGE is not set
CONFIG_NSS_L2TP is not set
CONFIG_NSS_PPTP is not set
CONFIG_NSS_MAP_T is not set
CONFIG_NSS_DTLS is not set
CONFIG_NSS_IPSEC is not set
CONFIG_NSS_MATCH is not set
CONFIG_NSS_PORT_ISOLATION is not set
CONFIG_NSS_POLICE is not set
CONFIG_NSS_QTAG is not set
CONFIG_NSS_VLAN is not set

# --------------------------
# 3. 网络基础（必须）
# --------------------------
CONFIG_PACKAGE_iptables-nft=y
CONFIG_PACKAGE_ip6tables-nft=y
CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
CONFIG_PACKAGE_odhcp6c=y
CONFIG_PACKAGE_odhcpd-ipv6only=y
CONFIG_PACKAGE_ipv6helper=y
CONFIG_PACKAGE_luci-proto-ipv6=y

CONFIG_PACKAGE_kmod-nat46=y
CONFIG_PACKAGE_kmod-inet-diag=y
CONFIG_PACKAGE_kmod-gre=y
CONFIG_PACKAGE_kmod-tun=y

# --------------------------
# 4. 你常用的插件
# --------------------------
# HomeProxy / PassWall 基础
CONFIG_PACKAGE_homeproxy=y
CONFIG_PACKAGE_luci-app-homeproxy=y
CONFIG_PACKAGE_dns2socks=y
CONFIG_PACKAGE_chnroute=y
CONFIG_PACKAGE_chnlist=y

# ZeroTier
CONFIG_PACKAGE_zerotier=y
CONFIG_PACKAGE_luci-app-zerotier=y

# Lucky
CONFIG_PACKAGE_lucky=y
CONFIG_PACKAGE_luci-app-lucky=y

# iperf3
CONFIG_PACKAGE_iperf3=y
CONFIG_PACKAGE_luci-app-iperf3=y

# UPnP
CONFIG_PACKAGE_minisign=y
CONFIG_PACKAGE_upnpd=y
CONFIG_PACKAGE_luci-app-upnp=y

# --------------------------
# 5. 管理页面 + Argon 主题
# --------------------------
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-mod-admin-full=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-app-argon-config=y
# CONFIG_PACKAGE_luci-theme-bootstrap is not set

# --------------------------
# 6. 常用工具
# --------------------------
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget-ssl=y
CONFIG_PACKAGE_nano=y
CONFIG_PACKAGE_openssl-util=y
CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_netdata=y
CONFIG_PACKAGE_tcpdump=y
CONFIG_PACKAGE_bind-dig=y
CONFIG_PACKAGE_bind-host=y

# --------------------------
# 7. 内核裁剪（减小体积）
# --------------------------
CONFIG_SIGNED_PACKAGES=n
CONFIG_CLEAN_IPKG=y
CONFIG_SMALL_FLASH=y
# CONFIG_KERNEL_DEBUG_INFO is not set
# CONFIG_KERNEL_KPROBES is not set